<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Symphonee</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    animation: fadeIn 480ms ease-out forwards;
  }
  .launch {
    width: 44%;
    max-width: 440px;
    height: auto;
    object-fit: contain;
  }
  .dots { display: flex; gap: 8px; }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    animation: dot 1.25s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes dot {
    0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
    40%           { opacity: 1;    transform: translateY(-6px); }
  }
  .quote {
    max-width: 660px;
    padding: 0 28px;
    text-align: center;
    color: rgba(255, 255, 255, 0.72);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 23px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: 0.2px;
    opacity: 0;
    transition: opacity 600ms ease;
    min-height: 2.6em;
  }
  .quote.visible { opacity: 1; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.78; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="launch" src="launch-logo.png" alt="Symphonee" />
    <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="quote" id="quote"></div>
  </div>
  <script>
    // The splash is brief and loaded from file://, so it cannot read the
    // same-origin /api/splash/quotes endpoint (CORS). It shows a rotating
    // placeholder line; the dashboard's loading overlay (same origin) carries
    // the real Mind-generated quote cycling, continuous with this.
    var QUOTES = [
      'Loading what we know...',
      'Small, deliberate steps. That is how the good work gets done.',
      'Measure first, then change. Profiling beats guessing.',
      'The mind remembers so the next session does not start from zero.',
      'Plan it, do not rush it.',
      'Warming up the knowledge graph...'
    ];
    var el = document.getElementById('quote');
    var i = Math.floor(Math.random() * QUOTES.length);
    function show() {
      el.classList.remove('visible');
      setTimeout(function () {
        el.textContent = QUOTES[i % QUOTES.length];
        el.classList.add('visible');
        i++;
      }, 200);
    }
    show();
    setInterval(show, 3200);
  </script>
</body>
</html>
