<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Symphonee</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    animation: fadeIn 480ms ease-out forwards;
  }
  .launch {
    width: 44%;
    max-width: 440px;
    height: auto;
    object-fit: contain;
  }
  .dots { display: flex; gap: 8px; }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    animation: dot 1.25s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes dot {
    0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
    40%           { opacity: 1;    transform: translateY(-6px); }
  }
  .quote {
    max-width: 660px;
    padding: 0 28px;
    text-align: center;
    color: rgba(255, 255, 255, 0.72);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 23px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: 0.2px;
    opacity: 0;
    transition: opacity 600ms ease;
    min-height: 2.6em;
  }
  .quote.visible { opacity: 1; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.78; }
  }
</style>
</head>
<body>
  <!-- Splash is JUST the centered logo. The quotes + dots loader live on the
       dashboard's loading overlay (same logo, same background) so the two read
       as one continuous screen: logo appears, then quotes + loader fade in.
       Keeping the quote off the splash avoids a quote flashing here and then
       a different one appearing on the overlay a moment later. -->
  <div class="wrap">
    <img class="launch" src="launch-logo.png" alt="Symphonee" />
  </div>
</body>
</html>
