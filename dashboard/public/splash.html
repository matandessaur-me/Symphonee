<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Symphonee</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  .wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 480ms ease-out forwards;
  }
  .launch {
    width: 70%;
    max-width: 720px;
    height: auto;
    object-fit: contain;
    animation: pulse 2.4s ease-in-out 480ms infinite;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.78; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="launch" src="launch.png" alt="Symphonee" />
  </div>
</body>
</html>
